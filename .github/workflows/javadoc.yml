name: Deploy Javadoc to Pages

on:
  push:
    branches: ["master"]
    paths:
      - "api/**"
      - "internal/**"
      - "build.gradle.kts"
      - "settings.gradle.kts"
      - ".github/workflows/javadoc.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: "25"
          distribution: "temurin"
          cache: gradle

      - name: Ensure Gradle Wrapper Executable
        run: |
          chmod +x ./gradlew

      - name: Generate Javadoc (API + Internal)
        env:
          SKIP_NATIVE_BINDINGS: "1"
        run: |
          ./gradlew :api:javadoc :internal:javadoc -x test

      - name: Combine Javadoc Output
        run: |
          rm -rf build/javadoc
          mkdir -p build/javadoc/api build/javadoc/internal
          cp -R api/build/docs/javadoc/* build/javadoc/api/
          cp -R internal/build/docs/javadoc/* build/javadoc/internal/
          touch build/javadoc/.nojekyll
          cat > build/javadoc/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8" />
            <meta name="viewport" content="width=device-width, initial-scale=1" />
            <title>Spartan Javadoc</title>
          </head>
          <body>
            <h1>Spartan Javadoc</h1>
            <ul>
              <li><a href="api/index.html">Public API</a></li>
              <li><a href="internal/index.html">Internal Architecture</a></li>
            </ul>
          </body>
          </html>
          EOF

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/javadoc

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
