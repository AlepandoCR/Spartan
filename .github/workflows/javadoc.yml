name: Deploy Javadoc to Pages

on:
  push:
    branches: ["master"]
    paths:
      - "api/**"
      - "internal/**"
      - "build.gradle.kts"
      - "settings.gradle.kts"
      - ".github/workflows/javadoc.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: "25"
          distribution: "temurin"
          cache: gradle

      - name: Ensure Gradle Wrapper Executable
        run: |
          chmod +x ./gradlew

      - name: Generate Javadoc (API + Internal)
        env:
          SKIP_NATIVE_BINDINGS: "1"
        run: |
          ./gradlew :api:javadoc :internal:javadoc -x test

      - name: Combine Javadoc Output
        run: |
          rm -rf build/javadoc
          mkdir -p build/javadoc/api build/javadoc/internal
          cp -R api/build/docs/javadoc/* build/javadoc/api/
          cp -R internal/build/docs/javadoc/* build/javadoc/internal/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/javadoc

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
