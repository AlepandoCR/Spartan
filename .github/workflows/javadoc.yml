name: Deploy Javadoc to Pages

on:
  push:
    branches: ["master"]
    paths:
      - "api/**"
      - "internal/**"
      - "build.gradle.kts"
      - "settings.gradle.kts"
      - ".github/workflows/javadoc.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: "25"
          distribution: "temurin"
          cache: gradle

      - name: Ensure Gradle Wrapper Executable
        run: |
          chmod +x ./gradlew

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Python Dependencies (clang)
        run: |
          pip install libclang==18.1.1

      - name: Generate FFM Bindings (Java-Native Bridge)
        run: |
          python scripts/generate_ffm_spartan_bridge.py \
            --cpp-source core/src/org/spartan/api/SpartanApi.cpp \
            --output internal/src/main/java/org/spartan/internal/bridge

      - name: Generate Javadoc (API + Internal)
        env:
          SKIP_NATIVE_BINDINGS: "1"
        run: |
          ./gradlew :api:javadoc :internal:javadoc -x test

      - name: Combine Javadoc Output
        run: |
          rm -rf build/javadoc
          mkdir -p build/javadoc/api build/javadoc/internal
          cp -R api/build/docs/javadoc/* build/javadoc/api/
          cp -R internal/build/docs/javadoc/* build/javadoc/internal/
          touch build/javadoc/.nojekyll
          cat > build/javadoc/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8" />
            <meta name="viewport" content="width=device-width, initial-scale=1" />
            <title>Project Spartan | Documentation</title>
            <style>
              :root { --bg-color: #0d1117; --card-bg: #161b22; --text-main: #c9d1d9; --text-muted: #8b949e; --accent: #58a6ff; --border: #30363d; }
              body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; background-color: var(--bg-color); color: var(--text-main); display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
              .container { max-width: 600px; text-align: center; padding: 2rem; }
              h1 { font-size: 2.5rem; margin-bottom: 0.5rem; font-weight: 600; letter-spacing: -1px; color: #ffffff; }
              p.subtitle { color: var(--text-muted); font-size: 1.1rem; margin-bottom: 2.5rem; }
              .grid { display: grid; gap: 1.5rem; grid-template-columns: 1fr; }
              @media (min-width: 480px) { .grid { grid-template-columns: 1fr 1fr; } }
              .card { background-color: var(--card-bg); border: 1px solid var(--border); border-radius: 8px; padding: 2rem 1.5rem; text-decoration: none; color: var(--text-main); transition: all 0.2s ease-in-out; display: flex; flex-direction: column; align-items: center; }
              .card:hover { border-color: var(--accent); transform: translateY(-3px); box-shadow: 0 8px 24px rgba(88, 166, 255, 0.15); }
              .card h2 { color: var(--accent); font-size: 1.25rem; margin: 0 0 0.5rem 0; }
              .card p { color: var(--text-muted); font-size: 0.9rem; margin: 0; line-height: 1.4; }
            </style>
          </head>
          <body>
            <div class="container">
              <h1>Project Spartan</h1>
              <p class="subtitle">Core Engine & API Reference</p>
              <div class="grid">
                <a href="api/index.html" class="card">
                  <h2>Public API</h2>
                  <p>Integration interfaces, events, and external model access.</p>
                </a>
                <a href="internal/index.html" class="card">
                  <h2>Internal Architecture</h2>
                  <p>FFM bindings, memory management, and deep learning models.</p>
                </a>
              </div>
            </div>
          </body>
          </html>
          EOF

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/javadoc

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
