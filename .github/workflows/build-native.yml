name: Build Spartan Native Library

on:
  push:
    branches: [ main, develop ]
    paths:
      - "core/**"
      - "internal/**"
      - "api/**"
      - ".github/workflows/build-native.yml"
  pull_request:
    branches: [ main, develop ]
    paths:
      - "core/**"
      - "internal/**"
      - "api/**"
      - ".github/workflows/build-native.yml"
  workflow_dispatch:

jobs:
  build-native:
    name: Build Native (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            cmake_build_dir: core/build-windows
            native_dir: windows
            lib_name: spartan_core.dll
          - os: ubuntu-latest
            cmake_build_dir: core/build-linux
            native_dir: linux
            lib_name: spartan_core.so
          - os: macos-latest
            cmake_build_dir: core/build-macos
            native_dir: macos
            lib_name: spartan_core.dylib

    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: gradle

      - name: Install GCC (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y g++-14
          sudo update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-14 100

      - name: Configure CMake
        run: |
          cmake -S core -B ${{ matrix.cmake_build_dir }} -DCMAKE_BUILD_TYPE=Release

      - name: Ensure Gradle Wrapper Executable
        if: matrix.os != 'windows-latest'
        run: |
          chmod +x ./gradlew

      - name: Build Native
        run: |
          cmake --build ${{ matrix.cmake_build_dir }} --config Release

      - name: Stage Native Into Resources
        shell: bash
        run: |
          ls -la ${{ matrix.cmake_build_dir }}/bin || true
          if [ ! -f "${{ matrix.cmake_build_dir }}/bin/${{ matrix.lib_name }}" ]; then
            echo "Native library not found: ${{ matrix.cmake_build_dir }}/bin/${{ matrix.lib_name }}"
            exit 1
          fi
          cmake -E make_directory internal/src/main/resources/native/${{ matrix.native_dir }}
          cmake -E copy ${{ matrix.cmake_build_dir }}/bin/${{ matrix.lib_name }} internal/src/main/resources/native/${{ matrix.native_dir }}/
          ls -la internal/src/main/resources/native/${{ matrix.native_dir }}

      - name: Build Internal Jar (OS Specific)
        shell: bash
        env:
          SKIP_NATIVE_BINDINGS: "1"
        run: |
          ./gradlew :internal:shadowJar -PnativeClassifier=${{ matrix.native_dir }} -PnativeLibDir=${{ matrix.cmake_build_dir }}/bin

      - name: Upload Native Artifact
        uses: actions/upload-artifact@v4
        with:
          name: spartan_core-${{ matrix.native_dir }}
          path: ${{ matrix.cmake_build_dir }}/bin/${{ matrix.lib_name }}

      - name: Upload Internal Jar Artifact
        uses: actions/upload-artifact@v4
        with:
          name: spartan-internal-${{ matrix.native_dir }}
          path: internal/build/libs/*.jar

      - name: Publish to Maven (OS Specific)
        if: github.ref == 'refs/heads/main'
        env:
          MAVEN_URL: ${{ secrets.MAVEN_URL }}
          MAVEN_USERNAME: ${{ secrets.MAVEN_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}
          SKIP_NATIVE_BINDINGS: "1"
        shell: bash
        run: |
          if [ -z "$MAVEN_URL" ]; then
            echo "MAVEN_URL not set; skipping publish"
            exit 0
          fi
          ./gradlew :api:publish :internal:publish -PnativeClassifier=${{ matrix.native_dir }} -PnativeLibDir=${{ matrix.cmake_build_dir }}/bin
