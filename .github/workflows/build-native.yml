name: Build Spartan Native Library

on:
  push:
    branches: [ main, develop ]
    paths:
      - "core/**"
      - "internal/**"
      - "api/**"
      - ".github/workflows/build-native.yml"
  pull_request:
    branches: [ main, develop ]
    paths:
      - "core/**"
      - "internal/**"
      - "api/**"
      - ".github/workflows/build-native.yml"
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish artifacts to Maven"
        required: false
        default: "false"

permissions:
  contents: read
  packages: write

jobs:
  build-os:
    name: Build Native (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            cmake_build_dir: core/build-windows
            native_dir: windows
            lib_name: spartan_core.dll
          - os: ubuntu-latest
            cmake_build_dir: core/build-linux
            native_dir: linux
            lib_name: spartan_core.so
          - os: macos-latest
            cmake_build_dir: core/build-macos
            native_dir: macos
            lib_name: spartan_core.dylib

    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: gradle

      - name: Install GCC (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y g++-14
          sudo update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-14 100

      - name: Configure CMake
        run: |
          cmake -S core -B ${{ matrix.cmake_build_dir }} -DCMAKE_BUILD_TYPE=Release

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: 'requirements.txt'

      - name: Install Python Dependencies (clang)
        run: |
          pip install -r requirements.txt

      - name: Generate FFM Bindings (Java-Native Bridge)
        shell: bash
        run: |
          python scripts/generate_ffm_spartan_bridge.py \
            --cpp-source core/src/org/spartan/api/SpartanApi.cpp \
            --output internal/src/main/java/org/spartan/internal/bridge

      - name: Ensure Gradle Wrapper Executable
        if: matrix.os != 'windows-latest'
        run: |
          chmod +x ./gradlew

      - name: Build Native
        run: |
          cmake --build ${{ matrix.cmake_build_dir }} --config Release

      - name: Build Java Jars (API + Internal)
        shell: bash
        env:
          SKIP_NATIVE_BINDINGS: "1"
        run: |
          ./gradlew :api:jar :internal:shadowJar -PnativeClassifier=${{ matrix.native_dir }} -PnativeLibDir=${{ matrix.cmake_build_dir }}/bin -x test

      - name: Upload Native Artifact
        uses: actions/upload-artifact@v4
        with:
          name: spartan_core-${{ matrix.native_dir }}
          path: ${{ matrix.cmake_build_dir }}/bin/${{ matrix.lib_name }}

      - name: Upload API Jar Artifact
        uses: actions/upload-artifact@v4
        with:
          name: spartan-api-${{ matrix.native_dir }}
          path: api/build/libs/*.jar

      - name: Upload Internal Jar Artifact
        uses: actions/upload-artifact@v4
        with:
          name: spartan-internal-${{ matrix.native_dir }}
          path: internal/build/libs/*.jar

  publish-maven:
    name: Publish Maven (Serial)
    runs-on: ubuntu-latest
    needs: build-os
    if: github.ref == 'refs/heads/main' || github.event.inputs.publish == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: gradle

      - name: Ensure Gradle Wrapper Executable
        run: |
          chmod +x ./gradlew

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Resolve Artifact Paths
        shell: bash
        run: |
          echo "Artifacts directory contents:"
          ls -la artifacts
          echo "API jar (linux):"
          ls -la artifacts/spartan-api-linux || true
          echo "Internal jars:"
          ls -la artifacts/spartan-internal-windows || true
          ls -la artifacts/spartan-internal-linux || true
          ls -la artifacts/spartan-internal-macos || true

          API_JAR=$(realpath artifacts/spartan-api-linux/*.jar | head -n 1)
          echo "API_JAR=$API_JAR" >> $GITHUB_ENV

          INTERNAL_WIN=$(realpath artifacts/spartan-internal-windows/*.jar | head -n 1)
          echo "INTERNAL_WIN=$INTERNAL_WIN" >> $GITHUB_ENV

          INTERNAL_LINUX=$(realpath artifacts/spartan-internal-linux/*.jar | head -n 1)
          echo "INTERNAL_LINUX=$INTERNAL_LINUX" >> $GITHUB_ENV

          INTERNAL_MAC=$(realpath artifacts/spartan-internal-macos/*.jar | head -n 1)
          echo "INTERNAL_MAC=$INTERNAL_MAC" >> $GITHUB_ENV

      - name: Publish API (generic)
        env:
          MAVEN_URL: ${{ secrets.MAVEN_URL }}
          MAVEN_USERNAME: ${{ secrets.MAVEN_USERAME }}
          MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}
          SKIP_NATIVE_BINDINGS: "1"
        run: |
          echo "Publishing to $MAVEN_URL"
          ./gradlew :api:publish -PprebuiltApiJar="$API_JAR" -x test

      - name: Publish Internal (windows)
        env:
          MAVEN_URL: ${{ secrets.MAVEN_URL }}
          MAVEN_USERNAME: ${{ secrets.MAVEN_USERAME }}
          MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}
          SKIP_NATIVE_BINDINGS: "1"
        run: |
          ./gradlew :internal:publish -PnativeClassifier=windows -PprebuiltInternalJar="$INTERNAL_WIN" -x test

      - name: Publish Internal (linux)
        env:
          MAVEN_URL: ${{ secrets.MAVEN_URL }}
          MAVEN_USERNAME: ${{ secrets.MAVEN_USERAME }}
          MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}
          SKIP_NATIVE_BINDINGS: "1"
        run: |
          ./gradlew :internal:publish -PnativeClassifier=linux -PprebuiltInternalJar="$INTERNAL_LINUX" -x test

      - name: Publish Internal (macos)
        env:
          MAVEN_URL: ${{ secrets.MAVEN_URL }}
          MAVEN_USERNAME: ${{ secrets.MAVEN_USERAME }}
          MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}
          SKIP_NATIVE_BINDINGS: "1"
        run: |
          ./gradlew :internal:publish -PnativeClassifier=macos -PprebuiltInternalJar="$INTERNAL_MAC" -x test
