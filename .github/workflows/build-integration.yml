name: Build Spartan Java Integration

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'api/**'
      - 'internal/**'
      - 'core/**'
      - '.github/workflows/build-integration.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'api/**'
      - 'internal/**'
      - 'core/**'
      - '.github/workflows/build-integration.yml'
  workflow_dispatch:

jobs:
  build-java:
    name: Build Java Modules
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: gradle

      - name: Build Java (skip tests)
        run: |
          ./gradlew :api:build :internal:build -x test

      - name: Upload Java artifacts
        uses: actions/upload-artifact@v4
        with:
          name: spartan-java-artifacts
          path: |
            api/build/libs/*.jar
            internal/build/libs/*.jar
